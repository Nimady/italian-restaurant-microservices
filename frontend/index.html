<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Italia - Restaurant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="subtitle">Restaurant italien</p>
      <h1>Bella Italia</h1>
      <p class="description">
        Découvrez notre menu italien et passez votre commande en quelques secondes.
        </p>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="section-header">
        <h2>Menu du restaurant</h2>
        <button onclick="loadMenu()">Actualiser le menu</button>
      </div>
      <div id="menu" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Créer une commande</h2>
      </div>

    <form id="orderForm" class="form">
        <input type="number" id="customerNumber" placeholder="Numéro client" required />
        <input type="text" id="items" placeholder="Ex: Pizza Margherita, Tiramisu" required />
        <button type="submit">Créer la commande</button>
    </form>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Commandes</h2>
        <button onclick="loadOrders()">Actualiser les commandes</button>
      </div>
      <div id="orders" class="orders"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Communication entre microservices</h2>
        <button onclick="testCommunication()">Tester</button>
      </div>
      <pre id="communicationResult">Clique sur “Tester” pour vérifier order-service → menu-service.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
